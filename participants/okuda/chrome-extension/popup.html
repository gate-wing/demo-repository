<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: sans-serif;
      background: #f9f9f9;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 14px;
      color: #333;
      text-align: center;
    }
    .section {
      margin-bottom: 12px;
    }
    .section-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }
    .radio-row {
      display: flex;
      gap: 10px;
    }
    .radio-row label {
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .check-row label {
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
    }
    input[type="color"] {
      width: 32px;
      height: 32px;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      padding: 2px;
      background: white;
    }
    input[type="color"]:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    #btn-copy {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #4a90d9;
      color: white;
      margin-top: 4px;
    }
    #btn-copy:hover {
      background: #357abd;
    }
    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 12px 0;
    }
    #message {
      margin-top: 10px;
      font-size: 12px;
      color: #27ae60;
      text-align: center;
      min-height: 18px;
    }
    #error {
      margin-top: 4px;
      font-size: 12px;
      color: #e74c3c;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h2>文章装飾コード生成</h2>

  <div class="section">
    <div class="section-label">文字サイズ</div>
    <div class="radio-row">
      <label><input type="radio" name="size" value="none" checked> 変更しない</label>
      <label><input type="radio" name="size" value="large"> 大きく</label>
      <label><input type="radio" name="size" value="small"> 小さく</label>
    </div>
  </div>

  <hr>

  <div class="section">
    <div class="check-row">
      <label>
        <input type="checkbox" id="chk-color"> 文字色を変える
      </label>
      <input type="color" id="pick-color" value="#e74c3c" title="色を選んでください" disabled>
    </div>
    <div class="check-row">
      <label>
        <input type="checkbox" id="chk-marker"> マーカーを引く
      </label>
      <input type="color" id="pick-marker" value="#f1c40f" title="色を選んでください" disabled>
    </div>
  </div>

  <button id="btn-copy">コードをコピー</button>

  <div id="message"></div>
  <div id="error"></div>

  <script src="popup.js"></script>
</body>
</html>
