<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: sans-serif;
      background: #f9f9f9;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 12px;
      color: #333;
      text-align: center;
    }
    .btn-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4a90d9;
      color: white;
      font-weight: bold;
    }
    button:hover {
      background: #357abd;
    }
    input[type="color"] {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      padding: 2px;
      background: white;
      border: 1px solid #ccc;
    }
    #message {
      margin-top: 12px;
      font-size: 12px;
      color: #27ae60;
      text-align: center;
      min-height: 18px;
    }
    #error {
      margin-top: 4px;
      font-size: 12px;
      color: #e74c3c;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h2>文章装飾コード生成</h2>

  <div class="btn-row">
    <button id="btn-larger">文字を大きく</button>
  </div>

  <div class="btn-row">
    <button id="btn-smaller">文字を小さく</button>
  </div>

  <div class="btn-row">
    <button id="btn-color">文字色を変える</button>
    <input type="color" id="pick-color" value="#e74c3c" title="色を選んでください">
  </div>

  <div class="btn-row">
    <button id="btn-marker">マーカーを引く</button>
    <input type="color" id="pick-marker" value="#f1c40f" title="色を選んでください">
  </div>

  <div id="message"></div>
  <div id="error"></div>

  <script src="popup.js"></script>
</body>
</html>
